<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профіль - Elegant Timer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand text-danger" href="../index.html">
                <span>Elegant Timer</span>
                <img src="../logo.png" alt="Логотип">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Головна</a>
                    </li>

                    <li class="nav-item" data-guest>
                        <a class="nav-link" href="register.html">Реєстрація</a>
                    </li>
                    <li class="nav-item" data-guest>
                        <a class="nav-link" href="login.html">Вхід</a>
                    </li>

                    <li class="nav-item" data-auth>
                        <a class="nav-link" href="profile.html">Профіль</a>
                    </li>
                    <li class="nav-item" data-auth id="logout-btn">
                        <a class="nav-link" href="#">Вийти</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="about.html">Про додаток</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container text-center">
        <h1 class="mb-4 text-danger">Мій профіль</h1>
        <div class="card mx-auto" style="max-width: 400px;">
            <div class="card-body">
                <h3 class="card-title" id="user-name"></h3>
                <p class="text-muted" id="user-email"></p>
                <p>Дата реєстрації: <span id="reg-date"></span></p>
            </div>
        </div>
    </div>

    <footer class="bg-light text-center text-lg-start mt-5 p-3">
        <div class="text-center text-muted">&copy; 2025 "Elegant Timer". Всі права захищені.</div>
    </footer>

    <script src="../script.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'login.html';
                return;
            }
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('user-name').textContent = user.name || '';
            document.getElementById('user-email').textContent = user.email || '';
            document.getElementById('reg-date').textContent = user.regDate || '';

            document.getElementById('logout-btn').addEventListener('click', e => {
                e.preventDefault();
                localStorage.setItem('isLoggedIn', 'false');
                window.location.href = '../index.html';
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
